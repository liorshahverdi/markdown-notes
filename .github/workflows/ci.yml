name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type and Svelte check
        run: npm run check

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

  cli:
    name: CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  swift:
    name: Swift app
    runs-on: macos-14
    defaults:
      run:
        working-directory: MarkdownNotes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: swift test
