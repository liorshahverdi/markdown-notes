<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#382E9E"/>
      <stop offset="100%" stop-color="#61409E"/>
    </linearGradient>
    <filter id="pageShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="nodeShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background: rounded square with indigo-to-purple gradient -->
  <rect x="16" y="16" width="480" height="480" rx="100" ry="100" fill="url(#bg)" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

  <!-- Page with corner fold -->
  <g filter="url(#pageShadow)">
    <path d="M140 122 L330 122 L380 172 L380 442 L140 442 Z" fill="rgba(255,255,255,0.95)"/>
  </g>
  <!-- Corner fold -->
  <path d="M330 122 L330 172 L380 172 Z" fill="#E0E0E0"/>

  <!-- Markdown lines on the page -->
  <!-- Heading bar (thick, indigo) -->
  <rect x="168" y="152" width="160" height="14" rx="4" fill="#403380"/>
  <!-- Body lines (gray) -->
  <rect x="168" y="192" width="190" height="8" rx="3" fill="#8C8C8C"/>
  <rect x="168" y="214" width="170" height="8" rx="3" fill="#8C8C8C"/>
  <rect x="168" y="236" width="140" height="8" rx="3" fill="#8C8C8C"/>

  <!-- Connector lines (drawn before nodes) -->
  <line x1="310" y1="310" x2="250" y2="330" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>
  <line x1="370" y1="310" x2="390" y2="330" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>

  <!-- Node A: teal (top) -->
  <g filter="url(#nodeShadow)">
    <rect x="280" y="260" width="120" height="50" rx="12" fill="#29C7A6"/>
  </g>
  <rect x="305" y="280" width="70" height="10" rx="3" fill="rgba(255,255,255,0.85)"/>

  <!-- Node B: coral (bottom-left) -->
  <g filter="url(#nodeShadow)">
    <rect x="200" y="308" width="100" height="44" rx="10" fill="#E8665C"/>
  </g>
  <rect x="220" y="325" width="60" height="8" rx="3" fill="rgba(255,255,255,0.85)"/>

  <!-- Node C: amber (bottom-right) -->
  <g filter="url(#nodeShadow)">
    <rect x="340" y="308" width="100" height="44" rx="10" fill="#F2BA33"/>
  </g>
  <rect x="360" y="325" width="60" height="8" rx="3" fill="rgba(255,255,255,0.85)"/>
</svg>
