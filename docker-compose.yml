services:
  markdown-notes:
    build:
      context: .
      dockerfile: Dockerfile
    image: markdown-notes:local
    container_name: markdown-notes
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5173
      MARKDOWN_NOTES_DATA_DIR: /data
    ports:
      - "5173:5173"
    volumes:
      - markdown-notes-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173/api/notes').then(r=>process.exit(r.status===401?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  markdown-notes-data:
